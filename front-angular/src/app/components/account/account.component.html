<div style="width: 98%; margin-left: auto; margin-right: auto;">
  <div class="row" style="margin-top: 1.5rem">
    <div class="col-9" style="text-align: center"><h3>{{ account()?.accountName }}</h3></div>
    <div class="col-3" style="text-align: end;"><h3
      style="margin-right: 5rem; color: rgba(0,0,0,0.63); font-family: 'Roboto Serif', serif">{{ account()?.amount | currency:'CAD' }}</h3>
    </div>
  </div>
  <div class="row">
    <div class="col-6">
      <app-account-records [accountId]="id()"/>
    </div>
    <div class="col-6">

    </div>
  </div>

</div>
